<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
  var p = window.location.pathname + window.location.search;
  sessionStorage.setItem('spa-redirect', p);
  if (window.location.pathname.indexOf('/wiki/') === 0) {
    window.location.replace('/wiki/');
  } else {
    window.location.replace('/');
  }
</script>
</body>
</html>
