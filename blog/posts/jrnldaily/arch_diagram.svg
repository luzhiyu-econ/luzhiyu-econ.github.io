<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', serif">
  <!-- Background -->
  <rect width="800" height="340" fill="#FAFAF7"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e" letter-spacing="1">JrnlDaily 系统架构</text>

  <!-- Step 1: OpenAlex -->
  <rect x="30" y="60" width="140" height="72" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="100" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#3730A3">OpenAlex API</text>
  <text x="100" y="108" text-anchor="middle" font-size="10" fill="#4B5563">2000+ 期刊元数据</text>
  <text x="100" y="122" text-anchor="middle" font-size="10" fill="#4B5563">DOI / 摘要 / 引用</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="96" x2="210" y2="96" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 2: Crawler -->
  <rect x="210" y="60" width="140" height="72" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="280" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">定时爬虫</text>
  <text x="280" y="108" text-anchor="middle" font-size="10" fill="#4B5563">每日自动抓取</text>
  <text x="280" y="122" text-anchor="middle" font-size="10" fill="#4B5563">ABS + 大学期刊目录</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="96" x2="390" y2="96" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 3: DeepSeek Translation -->
  <rect x="390" y="60" width="140" height="72" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="460" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">DeepSeek 翻译</text>
  <text x="460" y="108" text-anchor="middle" font-size="10" fill="#4B5563">标题 + 摘要</text>
  <text x="460" y="122" text-anchor="middle" font-size="10" fill="#4B5563">中英双语索引</text>

  <!-- Arrow 3 -->
  <line x1="530" y1="96" x2="570" y2="96" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 4: Database -->
  <rect x="570" y="60" width="140" height="72" rx="10" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
  <text x="640" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#831843">数据库存储</text>
  <text x="640" y="108" text-anchor="middle" font-size="10" fill="#4B5563">21世纪全量论文</text>
  <text x="640" y="122" text-anchor="middle" font-size="10" fill="#4B5563">结构化 + 全文检索</text>

  <!-- Down Arrow from DB to Platform -->
  <line x1="640" y1="132" x2="640" y2="170" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="640" y1="170" x2="400" y2="170" stroke="#9CA3AF" stroke-width="1.8"/>
  <line x1="400" y1="170" x2="400" y2="200" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 5: jrnldaily.com Platform -->
  <rect x="270" y="200" width="260" height="72" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">🌐 jrnldaily.com</text>
  <text x="400" y="248" text-anchor="middle" font-size="10" fill="#4B5563">推送阅读 · 双语搜索 · 每日更新</text>
  <text x="400" y="262" text-anchor="middle" font-size="10" fill="#4B5563">面向研究者的文献订阅平台</text>

  <!-- Future: Embedding (dashed) -->
  <rect x="140" y="200" width="118" height="72" rx="10" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="199" y="228" text-anchor="middle" font-size="11" fill="#6B7280">🔮 语义嵌入</text>
  <text x="199" y="246" text-anchor="middle" font-size="9" fill="#9CA3AF">RAG 向量搜索</text>
  <text x="199" y="260" text-anchor="middle" font-size="9" fill="#9CA3AF">（规划中）</text>
  <line x1="258" y1="236" x2="270" y2="236" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

  <!-- Future: Agent (dashed) -->
  <rect x="542" y="200" width="118" height="72" rx="10" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="601" y="228" text-anchor="middle" font-size="11" fill="#6B7280">🤖 科研 Agent</text>
  <text x="601" y="246" text-anchor="middle" font-size="9" fill="#9CA3AF">Claude Code 驱动</text>
  <text x="601" y="260" text-anchor="middle" font-size="9" fill="#9CA3AF">（规划中）</text>
  <line x1="530" y1="236" x2="542" y2="236" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

  <!-- Legend -->
  <rect x="30" y="295" width="12" height="12" rx="2" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
  <text x="48" y="306" font-size="10" fill="#6B7280">已上线</text>
  <rect x="110" y="295" width="12" height="12" rx="2" fill="none" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="128" y="306" font-size="10" fill="#9CA3AF">规划中</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#9CA3AF"/>
    </marker>
  </defs>
</svg>
