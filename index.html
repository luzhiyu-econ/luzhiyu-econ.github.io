<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陆知雨的个人主页——Blog</title>
    <style>
        body {
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 20px;
            position: relative;
            color: #374151;
            line-height: 1.8;
        }
        
        .nav-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 1rem;
        }
        
        .nav-link {
            color: #374151;
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }
        
        .nav-link:hover {
            background: #f3f4f6;
        }

        main {
            margin-top: 60px;
        }

        .title {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .blog-categories {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .category-tag {
            padding: 0.5rem 1rem;
            background: #f3f4f6;
            border-radius: 20px;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-tag:hover, .category-tag.active {
            background: #e5e7eb;
            color: #111827;
        }

        .blog-post {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            transition: transform 0.2s ease;
        }

        .blog-post:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .post-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #111827;
            margin-bottom: 0.5rem;
        }

        .post-meta {
            display: flex;
            gap: 1rem;
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .post-excerpt {
            color: #4b5563;
            margin-bottom: 1rem;
        }

        .read-more {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #f3f4f6;
            border-radius: 6px;
            color: #4b5563;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .read-more:hover {
            background: #e5e7eb;
            color: #111827;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .page-link {
            padding: 0.5rem 1rem;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .page-link:hover {
            background: #f3f4f6;
        }

        .page-link.active {
            background: #4b5563;
            color: white;
            border-color: #4b5563;
        }

        @media (max-width: 768px) {
            .nav-container {
                position: static;
                justify-content: flex-end;
                margin-bottom: 20px;
            }
            main {
                margin-top: 0;
            }
        }
    </style>
</head>
<body>
    <nav class="nav-container">
        <a href="index.html" class="nav-link">Blog</a>
        <a href="about.html" class="nav-link">CV</a>
    </nav>

    <main>

        <section>
            <div class="blog-categories">
                <span class="category-tag active">全部</span>
                <span class="category-tag">学术研究</span>
                <span class="category-tag">读书笔记</span>
                <span class="category-tag">生活随笔</span>
            </div>

            <div class="blog-post">
                <div class="post-title">大语言模型在经济学研究中的应用前景</div>
                <div class="post-meta">
                    <span>2024-03-15</span>
                    <span>学术研究</span>
                    <span>阅读时间：10分钟</span>
                </div>
                <div class="post-excerpt">
                    近年来，大语言模型（LLM）在自然语言处理领域取得了突破性进展。本文将探讨LLM在经济学研究中的潜在应用场景，特别是在文本分析、政策评估等方面的创新可能...
                </div>
                <a href="#" class="read-more">继续阅读</a>
            </div>

            <div class="blog-post">
                <div class="post-title">读《中国财政史》札记</div>
                <div class="post-meta">
                    <span>2024-03-10</span>
                    <span>读书笔记</span>
                    <span>阅读时间：15分钟</span>
                </div>
                <div class="post-excerpt">
                    最近在研读《中国财政史》，对古代财政制度的演变有了新的认识。特别是对于财政体制的历史沿革、税收制度的变迁以及其对现代财政体系的启示...
                </div>
                <a href="#" class="read-more">继续阅读</a>
            </div>

            <div class="pagination">
                <span class="page-link active">1</span>
                <span class="page-link">2</span>
                <span class="page-link">3</span>
                <span class="page-link">下一页</span>
            </div>
        </section>
    </main>
</body>
</html>
