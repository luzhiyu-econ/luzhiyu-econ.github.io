<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base — Zhiyu Lu</title>
    <meta name="robots" content="noindex, nofollow">
    <base href="/wiki/">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="sidebar-title">Knowledge Base</h1>
            <button class="sidebar-toggle" id="sidebar-close" aria-label="Close sidebar">✕</button>
        </div>

        <div class="sidebar-search">
            <input type="text" id="tag-search" placeholder="搜索 #标签 或关键词…">
        </div>

        <div class="tag-cloud" id="tag-cloud"></div>

        <nav class="file-tree" id="file-tree"></nav>
    </aside>

    <main class="wiki-main">
        <div class="wiki-topbar">
            <button class="sidebar-toggle mobile-only" id="sidebar-open" aria-label="Open sidebar">☰</button>
            <div class="wiki-breadcrumb" id="breadcrumb"></div>
        </div>

        <article class="wiki-content" id="wiki-content">
            <div class="wiki-welcome">
                <p>加载中…</p>
            </div>
        </article>
    </main>

    <script>(function(){var r=sessionStorage.getItem('spa-redirect');if(r){sessionStorage.removeItem('spa-redirect');history.replaceState(null,'',r)}})()</script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
